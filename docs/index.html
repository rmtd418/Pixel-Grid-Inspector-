<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Grid Resolution View</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Pixel Grid Resolution View</p>
        <h1>像素格校准台</h1>
        <p class="lead">纯静态版本。图片只在浏览器本地处理，可直接部署到 GitHub Pages。</p>
      </div>
    </section>

    <section class="panel uploader">
      <form id="detect-form">
        <div class="uploader-layout">
          <label class="dropzone" for="file-input">
            <input id="file-input" name="file" type="file" accept="image/png,image/jpeg,image/webp,image/bmp,image/gif,image/tiff,image/x-icon,.tif,.tiff,.ico" required>
            <span class="drop-kicker">导入原图</span>
            <span class="drop-title">选择图片或拖进来</span>
            <span class="drop-hint">支持 PNG / JPG / WEBP / BMP / GIF / TIFF / ICO。所有计算都在浏览器本地完成。</span>
          </label>

          <aside id="file-card" class="file-card empty">
            <div class="file-card-head">
              <span class="file-card-label">当前文件</span>
              <span id="file-state-badge" class="file-state-badge idle">未导入</span>
            </div>
            <div class="file-card-body">
              <div class="thumb-frame">
                <img id="file-thumb" alt="文件缩略图">
                <div id="thumb-placeholder" class="thumb-placeholder">等待图片</div>
              </div>
              <div class="file-meta">
                <strong id="file-name">未选择文件</strong>
                <span id="file-meta-line">请选择一张图片</span>
                <span id="status-text" class="status idle">等待上传</span>
              </div>
            </div>
          </aside>
        </div>

        <div class="actions">
          <button id="submit-btn" type="submit">开始检测</button>
          <button id="clear-btn" class="secondary-btn" type="button">清空当前文件</button>
        </div>
      </form>
    </section>

    <section class="grid">
      <article class="panel result-panel">
        <div class="panel-head">
          <h2>检测结果</h2>
        </div>
        <div id="empty-state" class="empty-state">还没有结果，先上传一张图。</div>
        <div id="result-body" class="result-body hidden">
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-label">位图横向步长</span>
              <strong id="dx-value">-</strong>
            </div>
            <div class="metric">
              <span class="metric-label">位图纵向步长</span>
              <strong id="dy-value">-</strong>
            </div>
            <div class="metric">
              <span class="metric-label">置信度</span>
              <strong id="confidence-value">-</strong>
            </div>
            <div class="metric">
              <span class="metric-label">位图尺寸</span>
              <strong id="raster-size-value">-</strong>
            </div>
          </div>

          <div class="result-list">
            <div><span>推断原始逻辑分辨率</span><strong id="logical-size-value">-</strong></div>
            <div><span>推断放大倍数</span><strong id="scale-value">-</strong></div>
            <div><span>候选周期</span><strong id="candidates-value">-</strong></div>
            <div><span>原点</span><strong id="origin-value">-</strong></div>
            <div><span>X/Y 线数</span><strong id="line-count-value">-</strong></div>
          </div>
        </div>
      </article>

      <article class="panel preview-panel">
        <div class="panel-head">
          <h2>图像预览</h2>
          <div class="toggle-row">
            <button id="show-original-btn" class="toggle active" type="button">原图</button>
            <button id="show-overlay-btn" class="toggle" type="button">叠加网格</button>
          </div>
        </div>
        <div class="preview-frame">
          <div id="preview-placeholder" class="preview-placeholder">导入图片后在这里查看原图与叠加结果。</div>
          <img id="preview-image" alt="预览图">
        </div>
      </article>
    </section>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
